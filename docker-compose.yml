services:
  # Nuxt 4 Web 界面
  nuxt-app:
    image: ${GIT_NEST_WEB_IMAGE:-git-nest-web:local}
    build: ./web
    container_name: git-nest-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      - NUXT_GIT_RUNNER_HOST=git-runner
      - NUXT_GIT_RUNNER_PORT=3001
      - NUXT_GIT_RUNNER_SECRET=${GIT_RUNNER_SECRET}
      - NUXT_AGENT_HOST=agent
      - NUXT_AGENT_PORT=3002
      - NUXT_AGENT_SECRET=${AGENT_SECRET}
      - NUXT_PUBLIC_CODE_SERVER_URL=${CODE_SERVER_URL:-}
      - NUXT_PUBLIC_SERVER_HOST=${NUXT_PUBLIC_SERVER_HOST:-}
      - NUXT_PUBLIC_SSH_HOST=${SSH_HOST:-}
      - NUXT_PUBLIC_SSH_PORT=${SSH_PORT:-22}
      - NUXT_PUBLIC_SSH_GIT_PATH=${SSH_GIT_PATH:-/data/git}
      - NUXT_WEB_PASSWORD=${WEB_PASSWORD:-}
    depends_on:
      git-runner:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - internal

  # Go git-runner sidecar
  git-runner:
    image: ${GIT_NEST_RUNNER_IMAGE:-git-nest-runner:local}
    build: ./runner
    container_name: git-nest-runner
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    environment:
      - API_SECRET=${GIT_RUNNER_SECRET}
      - GIT_DATA_DIR=/data/git
      - GIT_WORKSPACE_DIR=/data/workspace
      - COMMAND_TIMEOUT=${COMMAND_TIMEOUT:-30}
      - BACKUP_DIR=/data/backups
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-7}
      - BACKUP_SCHEDULE_HOUR=${BACKUP_SCHEDULE_HOUR:-3}
    volumes:
      - ${GIT_DATA_DIR:-./data/git}:/data/git
      - ${GIT_WORKSPACE_DIR:-./data/workspace}:/data/workspace
      - ${BACKUP_DIR:-./data/backups}:/data/backups
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - internal

  # agent orchestrator
  agent:
    image: ${GIT_NEST_AGENT_IMAGE:-git-nest-agent:local}
    build: ./agent
    container_name: git-nest-agent
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    environment:
      - API_SECRET=${AGENT_SECRET}
      - GIT_DATA_DIR=/data/git
      - GIT_WORKSPACE_DIR=/data/workspace
      - AGENT_STATE_DIR=/data/agent-state
      - HOME=/data/agent-state/home
      - GOOSE_HOME=/data/agent-state/home/.goose
      - XDG_CACHE_HOME=/data/agent-state/cache
      # 执行器配置：goose
      - AGENT_EXECUTOR_MAX_TURNS=${AGENT_EXECUTOR_MAX_TURNS:-30}
      - AGENT_EXECUTOR_TIMEOUT_MS=${AGENT_EXECUTOR_TIMEOUT_MS:-1800000}
      - AGENT_EXECUTOR_MAX_CONTINUATIONS=${AGENT_EXECUTOR_MAX_CONTINUATIONS:-2}
      # Goose CLI 配置（作为 --provider 和 --model 参数传递）
      - GOOSE_PROVIDER=${GOOSE_PROVIDER:-openai}
      - GOOSE_MODEL=${GOOSE_MODEL:-gpt-4o-mini}
      # AI Provider API Keys (根据 GOOSE_PROVIDER 选择使用)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_HOST=${ANTHROPIC_HOST:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT:-}
      - AZURE_OPENAI_DEPLOYMENT_NAME=${AZURE_OPENAI_DEPLOYMENT_NAME:-}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-}
      # 其他配置
      - COMMAND_TIMEOUT_MS=${COMMAND_TIMEOUT_MS:-120000}
      - AGENT_GIT_USER_NAME=${AGENT_GIT_USER_NAME:-Git Nest AI}
      - AGENT_GIT_USER_EMAIL=${AGENT_GIT_USER_EMAIL:-ai@git-nest.local}
      - WEBHOOK_URL=${WEBHOOK_URL:-}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-}
      - WEBHOOK_TIMEOUT_MS=${WEBHOOK_TIMEOUT_MS:-30000}
      - WEBHOOK_MAX_RETRIES=${WEBHOOK_MAX_RETRIES:-3}
      - PORT=3002
    volumes:
      - ${GIT_DATA_DIR:-./data/git}:/data/git
      - ${GIT_WORKSPACE_DIR:-./data/workspace}:/data/workspace
      - ${AGENT_STATE_DIR:-./data/agent-state}:/data/agent-state
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3002/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - internal

  # code-server 在线编辑器
  code-server:
    image: ${GIT_NEST_CODE_SERVER_IMAGE:-git-nest-code-server:local}
    build: ./code-server
    container_name: git-nest-editor
    restart: unless-stopped
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Asia/Shanghai}
      - PASSWORD=${CODE_SERVER_PASSWORD:-}
      - SUDO_PASSWORD=${CODE_SERVER_SUDO_PASSWORD:-}
      - DEFAULT_WORKSPACE=/workspace
    ports:
      - "${CODE_SERVER_PORT:-8443}:8443"
    volumes:
      - ${GIT_WORKSPACE_DIR:-./data/workspace}:/workspace
      - ${GIT_DATA_DIR:-./data/git}:/data/git
      - code-server-config:/config
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - internal

volumes:
  code-server-config:

networks:
  internal:
    driver: bridge
