title: Task with Human Approval
base_branch: main
max_iterations: 3
nodes:
  - id: analyze
    role: pm
    prompt: Analyze the requirements
  - id: implement
    role: developer
    prompt: Implement the feature
    tools: [cat, grep, git]
  - id: review
    role: reviewer
    prompt: Review the implementation
  - id: approve
    role: human_approval
    prompt: Please approve the implementation
edges:
  - from: analyze
    to: implement
    condition: success
  - from: implement
    to: review
    condition: success
  - from: review
    to: implement
    condition: needs_changes
  - from: review
    to: approve
    condition: success
  - from: approve
    to: end
    condition: approved
  - from: approve
    to: end
    condition: rejected
