name: Build Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: web
            image: git-nest-web
            context: ./web
          - name: runner
            image: git-nest-runner
            context: ./runner
          - name: code-server
            image: git-nest-code-server
            context: ./code-server

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Normalize image owner
        id: owner
        shell: bash
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Normalize image tag
        id: image-tag
        shell: bash
        run: |
          tag="$(printf '%s' "$GITHUB_REF_NAME" | tr '/:@' '---' | tr -c 'A-Za-z0-9_.-' '-')"
          tag="${tag#-}"
          tag="${tag%-}"
          echo "value=${tag:-manual}" >> "$GITHUB_OUTPUT"

      - name: Generate image tags
        id: image-tags
        shell: bash
        run: |
          image="${REGISTRY}/${{ steps.owner.outputs.value }}/${{ matrix.image }}"
          {
            echo 'value<<EOF'
            echo "${image}:${GITHUB_SHA}"
            echo "${image}:${{ steps.image-tag.outputs.value }}"
            if [ "$GITHUB_REF" = "refs/heads/main" ] || [[ "$GITHUB_REF" == refs/tags/v* ]]; then
              echo "${image}:latest"
            fi
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.image-tags.outputs.value }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
